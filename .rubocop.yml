inherit_gem:
  rubocop-shopify: rubocop.yml

AllCops:
  TargetRubyVersion: 3.1
  Exclude:
    - 'vendor/**/*'
    - 'node_modules/**/*'
    - 'tmp/**/*'
    - 'bin/**/*'
    - 'spec/fixtures/**/*'

# Project-specific overrides

# We want to keep validate! as a method name (Rails convention)
Naming/PredicateMethod:
  Exclude:
    - 'lib/tradestation/configuration.rb'

# Allow multiline block chains in specs for readability
Style/MultilineBlockChain:
  Exclude:
    - 'spec/**/*'

# We prefer double quotes for consistency
Style/StringLiterals:
  Enabled: true
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  Enabled: true
  EnforcedStyle: double_quotes